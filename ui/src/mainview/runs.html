<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Runs</title>
    <link rel="stylesheet" href="runs.css" />
  </head>
  <body style="overflow: hidden">
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span id="workflow-label">Loading workflow...</span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px">
        <div
          id="dtu-status"
          class="status-badge status-Unknown"
          style="cursor: pointer; user-select: none"
        >
          DTU: Checking...
        </div>
        <button id="sse-audit-btn" class="sse-audit-btn">
          Events <span id="sse-audit-count">0</span>
        </button>
      </div>
    </div>
    <div id="sse-audit-panel" class="sse-audit-panel" style="display: none">
      <div class="sse-audit-header">
        <span>SSE Event Log</span>
        <button id="sse-audit-clear" class="sse-audit-clear">Clear</button>
      </div>
      <div id="sse-audit-list" class="sse-audit-list"></div>
    </div>

    <div
      class="content animate-fade-in"
      style="
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        padding: 0;
        max-width: 100%;
        overflow: hidden;
      "
    >
      <!-- Header bar -->
      <div
        style="
          padding: 12px 20px;
          border-bottom: 1px solid var(--panel-border);
          background: var(--panel-bg);
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-shrink: 0;
        "
      >
        <div>
          <h2 id="run-title" style="margin: 0; font-size: 15px">Loading run...</h2>
        </div>
        <div style="display: flex; gap: 8px">
          <span id="run-status" class="status-badge" style="display: none"></span>
          <button
            id="stop-run-btn"
            class="btn"
            style="
              display: none;
              height: 24px;
              padding: 0 8px;
              font-size: 12px;
              color: var(--danger);
              border-color: var(--danger);
            "
          >
            Stop Run
          </button>
        </div>
      </div>

      <!-- Two-pane: step list + log viewer -->
      <div style="display: flex; flex: 1; min-height: 0; overflow: hidden">
        <!-- Left: step list -->
        <div id="step-list" class="step-list"></div>
        <!-- Right: log viewer -->
        <div id="logs-viewer" class="log-viewer" style="flex: 1; border-radius: 0">
          Loading logs...
        </div>
      </div>

      <!-- Stats panel (compact bottom bar) -->
      <div
        id="run-stats-panel"
        style="
          display: none;
          background: var(--panel-bg);
          border-top: 1px solid var(--panel-border);
          flex-shrink: 0;
          padding: 4px 16px;
        "
      >
        <div
          id="run-stats-bar"
          style="
            display: flex;
            font-size: 10px;
            color: var(--text-secondary);
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
          "
        ></div>
        <div style="display: flex; gap: 12px; padding: 2px 0 2px">
          <div style="flex: 1; min-width: 0">
            <div style="font-size: 9px; color: var(--text-secondary); opacity: 0.7">CPU %</div>
            <canvas
              id="chart-cpu"
              height="36"
              style="width: 100%; height: 36px; display: block"
            ></canvas>
          </div>
          <div style="flex: 1; min-width: 0">
            <div style="font-size: 9px; color: var(--text-secondary); opacity: 0.7">Memory</div>
            <canvas
              id="chart-mem"
              height="36"
              style="width: 100%; height: 36px; display: block"
            ></canvas>
          </div>
          <div style="flex: 1; min-width: 0">
            <div style="font-size: 9px; color: var(--text-secondary); opacity: 0.7">
              Network I/O
            </div>
            <canvas
              id="chart-net"
              height="36"
              style="width: 100%; height: 36px; display: block"
            ></canvas>
          </div>
        </div>
      </div>
    </div>
    <script src="runs.js"></script>
  </body>
</html>
