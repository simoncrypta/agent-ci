<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Runs</title>
    <link rel="stylesheet" href="runs.css" />
  </head>
  <body style="overflow: hidden">
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span id="workflow-label">Loading workflow...</span>
      </div>
      <div
        id="dtu-status"
        class="status-badge status-Unknown"
        style="cursor: pointer; user-select: none"
      >
        DTU: Checking...
      </div>
    </div>

    <div
      class="content animate-fade-in"
      style="
        display: flex;
        flex-direction: column;
        height: calc(100vh - 40px);
        padding: 0;
        max-width: 100%;
      "
    >
      <div
        style="
          padding: 16px 24px;
          border-bottom: 1px solid var(--panel-border);
          background: var(--panel-bg);
          display: flex;
          justify-content: space-between;
          align-items: center;
        "
      >
        <div>
          <h2 id="run-title" style="margin: 0; font-size: 16px">Run Logs</h2>
        </div>
        <div style="display: flex; gap: 8px">
          <span id="run-status" class="status-badge" style="display: none"></span>
          <button
            id="stop-run-btn"
            class="btn"
            style="
              display: none;
              height: 24px;
              padding: 0 8px;
              font-size: 12px;
              color: var(--danger);
              border-color: var(--danger);
            "
          >
            Stop Run
          </button>
        </div>
      </div>
      <div id="logs-viewer" class="log-viewer" style="flex: 1; border-radius: 0">
        Loading logs...
      </div>
    </div>
    <script src="runs.js"></script>
  </body>
</html>
