<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Commits</title>
    <link rel="stylesheet" href="commits.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span id="repo-name-display">Repository Name</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px">
        <div style="display: flex; align-items: center; gap: 8px">
          <span style="font-size: 13px; color: var(--text-secondary); font-weight: bold"
            >Run on commit:</span
          >
          <button
            id="watch-mode-toggle"
            class="btn"
            style="
              padding: 4px 12px;
              font-size: 12px;
              background: #333;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Off
          </button>
        </div>
        <div
          id="dtu-status"
          class="status-badge status-Unknown"
          style="cursor: pointer; user-select: none"
        >
          DTU: Checking...
        </div>
      </div>
    </div>
    <div class="pane-container animate-fade-in">
      <div class="pane-left">
        <div class="pane-header">
          <h2 id="current-branch-header" style="font-size: 16px; margin: 0">Commits</h2>
        </div>
        <div
          id="commits-list"
          style="padding: 16px; display: flex; flex-direction: column; gap: 8px"
        >
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="pane-right" style="padding: 24px; position: relative">
        <h2 id="selected-commit-header" style="margin-top: 0; margin-bottom: 24px">
          Select a commit
        </h2>

        <div id="commit-details-container" style="display: none">
          <h3
            style="margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--panel-border)"
          >
            Available Workflows
          </h3>
          <div
            id="workflows-list"
            style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px"
          >
            <!-- Populated by JS -->
          </div>

          <h3
            style="margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--panel-border)"
          >
            Runs
          </h3>
          <div id="runs-list" style="display: flex; flex-direction: column; gap: 8px">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
    <script src="commits.js"></script>
  </body>
</html>
