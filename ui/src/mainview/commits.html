<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Commits</title>
    <link rel="stylesheet" href="commits.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <!-- Back button removed -->
        <span id="repo-name-display">Repository Name</span>
      </div>
      <div style="display: flex; align-items: center; gap: 16px">
        <div style="display: flex; align-items: center; gap: 8px">
          <span style="font-size: 13px; color: var(--text-secondary); font-weight: bold"
            >Run on commit:</span
          >
          <button
            id="watch-mode-toggle"
            class="btn"
            style="
              padding: 4px 12px;
              font-size: 12px;
              background: #333;
              color: white;
              border: none;
              border-radius: 4px;
              cursor: pointer;
            "
          >
            Off
          </button>
        </div>
        <div style="display: flex; align-items: center; gap: 6px">
          <span style="font-size: 12px; color: var(--text-secondary)">⚡</span>
          <button
            id="concurrency-dec"
            class="btn"
            style="
              width: 22px;
              height: 22px;
              padding: 0;
              font-size: 14px;
              line-height: 1;
              background: #333;
              border: 1px solid #555;
              border-radius: 3px;
              cursor: pointer;
              color: white;
            "
          >
            −
          </button>
          <span
            id="concurrency-value"
            style="font-size: 13px; font-weight: bold; min-width: 16px; text-align: center"
            >—</span
          >
          <button
            id="concurrency-inc"
            class="btn"
            style="
              width: 22px;
              height: 22px;
              padding: 0;
              font-size: 14px;
              line-height: 1;
              background: #333;
              border: 1px solid #555;
              border-radius: 3px;
              cursor: pointer;
              color: white;
            "
          >
            +
          </button>
        </div>
        <button id="sse-audit-btn" class="sse-audit-btn">
          Events <span id="sse-audit-count">0</span>
        </button>
      </div>
    </div>
    <div id="sse-audit-panel" class="sse-audit-panel" style="display: none">
      <div class="sse-audit-header">
        <span>SSE Event Log</span>
        <button id="sse-audit-clear" class="sse-audit-clear">Clear</button>
      </div>
      <div id="sse-audit-list" class="sse-audit-list"></div>
    </div>
    <div class="pane-container animate-fade-in">
      <div class="pane-left">
        <div class="pane-header">
          <h2 id="current-branch-header" style="font-size: 16px; margin: 0">Commits</h2>
        </div>
        <div
          id="commits-list"
          style="padding: 16px; display: flex; flex-direction: column; gap: 8px"
        >
          <!-- Populated by JS -->
        </div>
      </div>
      <div class="pane-right" style="padding: 24px; position: relative">
        <h2 id="selected-commit-header" style="margin-top: 0; margin-bottom: 24px">
          Select a commit
        </h2>

        <div id="commit-details-container" style="display: none">
          <h3
            style="margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--panel-border)"
          >
            Available Workflows
          </h3>
          <div
            id="workflows-list"
            style="display: flex; flex-direction: column; gap: 8px; margin-bottom: 32px"
          >
            <!-- Populated by JS -->
          </div>

          <h3
            style="margin-top: 0; padding-bottom: 8px; border-bottom: 1px solid var(--panel-border)"
          >
            Runs
          </h3>
          <div id="runs-list" style="display: flex; flex-direction: column; gap: 8px">
            <!-- Populated by JS -->
          </div>
        </div>
      </div>
    </div>
    <script src="commits.js"></script>
  </body>
</html>
