<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Branches</title>
    <link rel="stylesheet" href="branches.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span>OA - <span id="repo-name-display">Loading repo...</span></span>
      </div>
      <div
        id="dtu-status"
        class="status-badge status-Unknown"
        style="cursor: pointer; user-select: none"
      >
        DTU: Checking...
      </div>
    </div>
    <div class="content animate-fade-in">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 24px;
        "
      >
        <h1>Branches</h1>
      </div>
      <div id="branches-list" style="display: flex; flex-direction: column; gap: 8px">
        <!-- Populated by JS -->
      </div>
    </div>
    <script src="branches.js"></script>
  </body>
</html>
