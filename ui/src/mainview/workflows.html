<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OA - Workflows</title>
    <link rel="stylesheet" href="workflows.css" />
  </head>
  <body>
    <div class="titlebar" style="justify-content: space-between">
      <div style="display: flex; align-items: center">
        <button
          class="btn"
          id="back-btn"
          style="height: 24px; padding: 0 8px; margin-right: 12px; font-size: 12px"
        >
          ← Back
        </button>
        <span>OA - <span id="commit-label">Loading context...</span></span>
      </div>
      <div style="display: flex; align-items: center; gap: 8px">
        <button id="sse-audit-btn" class="sse-audit-btn">
          Events <span id="sse-audit-count">0</span>
        </button>
      </div>
    </div>
    <div id="sse-audit-panel" class="sse-audit-panel" style="display: none">
      <div class="sse-audit-header">
        <span>SSE Event Log</span>
        <button id="sse-audit-clear" class="sse-audit-clear">Clear</button>
      </div>
      <div id="sse-audit-list" class="sse-audit-list"></div>
    </div>

    <div class="content animate-fade-in">
      <div
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          margin-bottom: 24px;
        "
      >
        <h1>Workflows</h1>
      </div>
      <div id="workflows-list" style="display: flex; flex-direction: column; gap: 8px">
        <!-- Populated by JS -->
      </div>
    </div>
    <script src="workflows.js"></script>
  </body>
</html>
