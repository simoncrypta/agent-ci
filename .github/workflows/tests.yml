name: Tests

on:
  push:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".docs/**"
      - "LICENSE"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm check
      - name: Test DTU
        run: pnpm --filter dtu-github-actions test
      - name: Test CLI
        run: pnpm --filter agent-ci test
