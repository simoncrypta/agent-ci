name: Tests

on: [push]

jobs:
  get-runner:
    runs-on: ubuntu-latest
    outputs:
      target_runner: ${{ steps.status.outputs.label }}
    steps:
      - id: status
        run: |
          # Query the Cloudflare Orchestrator for local agent presence
          RESPONSE=$(curl -s https://oa-1.redwoodjs.workers.dev/api/presence?username=${{ github.actor }})
          if [ "$RESPONSE" == "active" ]; then
            echo "label=opposite-actions" >> $GITHUB_OUTPUT
          else
            echo "label=ubuntu-latest" >> $GITHUB_OUTPUT
          fi

  test:
    needs: get-runner
    runs-on: ${{ needs.get-runner.outputs.target_runner }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm check
      - name: Test DTU
        run: pnpm --filter dtu-github-actions test
      - name: Test Supervisor
        run: pnpm --filter supervisor test
