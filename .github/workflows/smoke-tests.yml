name: Smoke Tests

on:
  push:
  pull_request_target:
    types: [labeled, synchronize]

jobs:
  # Wave 1 (parallel): matrix sharding smoke — verifies matrix strategy fan-out
  matrix-shards:
    name: Shard
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'safe-to-run') && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3]
    steps:
      - name: Verify matrix shard (${{ matrix.shard }}/${{ strategy.job-total }})
        run: |
          echo "shard=${{ matrix.shard }}"
          echo "job-total=${{ strategy.job-total }}"
          [ "${{ matrix.shard }}" != "" ] || (echo "❌ matrix.shard is empty" && exit 1)
          [ "${{ strategy.job-total }}" = "3" ] || (echo "❌ strategy.job-total is '${{ strategy.job-total }}', expected '3'" && exit 1)
          echo "✅ Shard ${{ matrix.shard }} of ${{ strategy.job-total }} resolved correctly"

  # Wave 1: build job — uploads the artifact
  build:
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'safe-to-run') && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    steps:
      - name: Caching is natively supported
        id: cache-smoke
        uses: actions/cache@v4
        with:
          path: smoke-cache-file.txt
          key: smoke-test-cache-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            smoke-test-cache-${{ runner.os }}-
      - name: Write Cache File
        if: steps.cache-smoke.outputs.cache-hit != 'true'
        run: echo "Hello from cache" > smoke-cache-file.txt
      - name: Verify Cache File
        run: grep "Hello from cache" smoke-cache-file.txt

      - name: Say Hello
        run: echo "Hello from E2E"

      - name: Create Build Output
        run: echo "built artifact content" > build-output.txt

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: smoke-build
          path: build-output.txt

  # Wave 2: verify job — needs build, downloads artifact, and talks to a service by name.
  verify:
    needs: build
    runs-on: ubuntu-latest
    # A container block is required for service hostnames (e.g. "cache-db") to be resolvable
    # via Docker DNS on real GitHub runners. Without it, services are only reachable via localhost.
    # Our local runner always uses Docker aliasing, so this aligns both environments.
    container: ghcr.io/actions/actions-runner:latest
    services:
      cache-db:
        image: redis:7-alpine
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=5s
          --health-timeout=3s
          --health-retries=5
    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: smoke-build
          path: downloaded-artifacts

      - name: Verify Artifact
        run: |
          cat downloaded-artifacts/build-output.txt
          grep "built artifact content" downloaded-artifacts/build-output.txt
          echo "Artifact verified successfully"

      - name: Verify standard runner env vars are set
        # GitHub Actions always sets CI=true, GITHUB_ACTIONS=true, and RUNNER_OS.
        # Reproduces the failure where CI=false caused DB_HOST to default to localhost.
        run: |
          echo "CI=$CI"
          echo "GITHUB_ACTIONS=$GITHUB_ACTIONS"
          echo "RUNNER_OS=$RUNNER_OS"
          [ "$CI" = "true" ]             || (echo "❌ CI is not 'true'" && exit 1)
          [ "$GITHUB_ACTIONS" = "true" ] || (echo "❌ GITHUB_ACTIONS is not 'true'" && exit 1)
          [ -n "$RUNNER_OS" ]            || (echo "❌ RUNNER_OS is empty" && exit 1)
          [ -n "$GITHUB_WORKSPACE" ]     || (echo "❌ GITHUB_WORKSPACE is empty" && exit 1)
          echo "✅ Standard runner env vars are present"

      - name: Verify step-level env vars reach the step process
        # Reproduces the failure where `env: DB_HOST: mysql` was silently dropped and
        # the process fell back to DB_HOST=localhost from .env.test.
        run: |
          echo "STEP_DB_HOST=$STEP_DB_HOST"
          echo "STEP_CUSTOM=$STEP_CUSTOM"
          [ "$STEP_DB_HOST" = "cache-db" ] || (echo "❌ STEP_DB_HOST is '$STEP_DB_HOST', expected 'cache-db'" && exit 1)
          [ "$STEP_CUSTOM" = "hello-from-env" ] || (echo "❌ STEP_CUSTOM is '$STEP_CUSTOM'" && exit 1)
          echo "✅ Step-level env vars are correctly passed to the step process"
        env:
          STEP_DB_HOST: cache-db
          STEP_CUSTOM: hello-from-env

      - name: Verify service is reachable by hostname
        # Connects to the service using its YAML key name as the hostname.
        # Without Docker network aliases this resolves to nothing and fails with ECONNREFUSED,
        # reproducing the same failure mode as DB_HOST=mysql in the Playwright workflow.
        run: |
          echo "Connecting to cache-db:6379..."
          python3 - <<'EOF'
          import socket, sys
          try:
              s = socket.create_connection(("cache-db", 6379), timeout=5)
              s.sendall(b"PING\r\n")
              resp = s.recv(128).decode()
              s.close()
              assert resp.startswith("+PONG"), f"Expected +PONG, got: {resp!r}"
              print("✅ Service alias resolves correctly — cache-db:6379 reachable")
          except Exception as e:
              print(f"❌ Failed: {e}", file=sys.stderr)
              sys.exit(1)
          EOF
        env:
          CACHE_HOST: cache-db
          CACHE_PORT: "6379"

  # ── Cross-job outputs smoke test ───────────────────────────────────────────────

  # Wave 1: setup-outputs sets step outputs via $GITHUB_OUTPUT
  setup-outputs:
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'safe-to-run') && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    outputs:
      deploy_env: ${{ steps.set-env.outputs.deploy_env }}
      shard_count: ${{ steps.set-shards.outputs.shard_count }}
    steps:
      - name: Set deploy environment
        id: set-env
        run: echo "deploy_env=staging" >> "$GITHUB_OUTPUT"

      - name: Set shard count
        id: set-shards
        run: echo "shard_count=4" >> "$GITHUB_OUTPUT"

  # Wave 2: consume-outputs reads the values via needs.*.outputs.*
  consume-outputs:
    needs: setup-outputs
    runs-on: ubuntu-latest
    steps:
      - name: Verify cross-job outputs
        run: |
          echo "deploy_env=${{ needs.setup-outputs.outputs.deploy_env }}"
          echo "shard_count=${{ needs.setup-outputs.outputs.shard_count }}"
          [ "${{ needs.setup-outputs.outputs.deploy_env }}" = "staging" ] || (echo "❌ deploy_env is '${{ needs.setup-outputs.outputs.deploy_env }}', expected 'staging'" && exit 1)
          [ "${{ needs.setup-outputs.outputs.shard_count }}" = "4" ] || (echo "❌ shard_count is '${{ needs.setup-outputs.outputs.shard_count }}', expected '4'" && exit 1)
          echo "✅ Cross-job outputs resolved correctly"

  # ── Job-level if: condition smoke test ──────────────────────────────────────────

  # This job always runs (if: always()) even if upstream jobs fail
  always-runs:
    needs: [build, setup-outputs]
    if: always() && (github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'safe-to-run') && !github.event.pull_request.draft))
    runs-on: ubuntu-latest
    steps:
      - name: Verify this job ran despite upstream state
        run: echo "✅ Job with if:always() ran correctly"

  # ── Binary smoke test ──────────────────────────────────────────────────────────
  # Builds the actual release binary and verifies it executes correctly,
  # catching shebang issues, broken imports, and bin-field misconfigurations.

  binary-smoke:
    name: Binary Smoke
    if: github.event_name == 'push' || (contains(github.event.pull_request.labels.*.name, 'safe-to-run') && !github.event.pull_request.draft)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.30.1
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
      - run: pnpm install
      - run: pnpm -r build
      - name: Verify shebang
        run: |
          head -1 packages/cli/dist/cli.js | grep -q '#!/usr/bin/env node'
          echo "✅ Shebang is correct"
      - name: Run built binary (node)
        run: |
          set +e
          output=$(node packages/cli/dist/cli.js 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          [ "$exit_code" -eq 1 ] || (echo "❌ Expected exit code 1, got $exit_code" && exit 1)
          echo "$output" | grep -q "Usage: agent-ci" || (echo "❌ Usage text not found" && exit 1)
          echo "✅ Built binary executes correctly via node"
      - name: Run built binary (npx)
        run: |
          set +e
          output=$(npx --yes ./packages/cli 2>&1)
          exit_code=$?
          set -e
          echo "$output"
          [ "$exit_code" -eq 1 ] || (echo "❌ Expected exit code 1, got $exit_code" && exit 1)
          echo "$output" | grep -q "Usage: agent-ci" || (echo "❌ Usage text not found in npx output" && exit 1)
          echo "✅ Built binary executes correctly via npx"
