name: Test Opposite-Actions

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  check-availability:
    runs-on: ubuntu-latest
    outputs:
      target_runner: ${{ steps.status.outputs.label }}
    steps:
      - id: status
        run: |
          # Query the Cloudflare Orchestrator for local agent presence
          RESPONSE=$(curl -s https://oa-1.redwoodjs.workers.dev/api/presence?username=${{ github.actor }})
          if [ "$RESPONSE" == "active" ]; then
            echo "label=opposite-actions" >> $GITHUB_OUTPUT
          else
            echo "label=ubuntu-latest" >> $GITHUB_OUTPUT
          fi

  test:
    needs: check-availability
    runs-on: ${{ needs.check-availability.outputs.target_runner }}
    steps:
      - uses: actions/checkout@v4
      - name: HelloWorld
        run: |
          echo "This job is running on: ${{ needs.check-availability.outputs.target_runner }}"
          echo "If this says 'opposite-actions', it was executed by your local Opposite-Actions runner!"
